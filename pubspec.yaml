name: nutraflow
description: "NutraFlow — AI-powered nutrition tracking app"
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10

  # Icons
  phosphor_flutter: ^2.0.1

  # Charts & UI
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Subscriptions
  purchases_flutter: ^10.0.1

  # Utils
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/icons/
