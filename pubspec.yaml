name: nutraflow
description: "NutraFlow — AI-powered nutrition tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Icons
  phosphor_flutter: ^2.0.1

  # Charts & UI
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Subscriptions
  purchases_flutter: ^7.0.0

  # Utils
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
